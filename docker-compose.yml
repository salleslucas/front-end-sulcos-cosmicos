services:
  # ─── Produção (Nginx + build estático) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sulco-cosmico-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    profiles:
      - prod

  # ─── Desenvolvimento (Vite HMR / hot reload) ─────────────────────────────────
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sulco-cosmico-dev
    ports:
      - "5173:5173"
    volumes:
      # Monta o código-fonte local dentro do container (hot reload)
      - .:/app
      # Preserva o node_modules do container (não sobrescreve com o da máquina)
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true   # garante detecção de mudanças no Windows/WSL
    profiles:
      - dev

networks:
  default:
    name: sulco-cosmico-network
